<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Operacional - Vigify</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f1f5f9; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <!-- O IFRAME FAZ TODO O TRABALHO DENTRO DO SEU SITE SEM MUDAR A URL DO NAVEGADOR -->
  <iframe src="https://script.google.com/macros/s/AKfycbzTmGFV1toKDexDbS0-3pGvnUjDyyenN0zlKkBz0Tbx/dev" allow="geolocation; camera"></iframe>

  <script>
    // TRAVA DE SEGURANÇA: Dificulta a cópia da URL interna por curiosos
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
